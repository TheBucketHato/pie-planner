<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pie Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    (function () {
      var t = localStorage.getItem('pp-theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>

  <div id="app">

    <!-- ===== SIDEBAR ===== -->
    <aside id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <span class="logo-icon">🥧</span>
          <span class="logo-text">Pie Planner</span>
        </div>
        <button id="create-btn" class="create-btn">+ Create</button>
      </div>

      <div id="mini-cal"></div>

      <div class="sidebar-tasks">
        <div class="tasks-header">
          <span>Tasks</span>
          <button id="add-task-btn" class="icon-btn" title="Add task">+</button>
        </div>
        <ul id="task-list"></ul>
      </div>

      <div class="sidebar-categories">
        <div class="categories-header">
          <span>Categories</span>
          <div class="categories-header-btns">
            <button id="add-category-btn" class="icon-btn" title="Add category">+</button>
            <button id="manage-categories-btn" class="icon-btn" title="Manage categories">⚙</button>
          </div>
        </div>
        <ul id="category-list"></ul>
      </div>
    </aside>

    <!-- ===== MAIN ===== -->
    <div id="main">
      <header id="cal-header">
        <div class="header-left">
          <button id="today-btn" class="today-btn">Today</button>
          <button id="prev-btn" class="nav-btn">&#8249;</button>
          <button id="next-btn" class="nav-btn">&#8250;</button>
          <h2 id="header-title"></h2>
        </div>
        <div class="header-right">
          <button id="profile-btn" class="profile-btn" title="Profiles"></button>
          <div class="theme-toggle">
            <input type="checkbox" id="dark-mode-toggle" aria-label="Toggle dark mode">
            <label for="dark-mode-toggle" class="toggle" title="Toggle dark mode">🌙</label>
            <button id="color-customize-btn" class="icon-btn" title="Customize colors">🎨</button>
          </div>
          <div class="view-switcher">
            <button class="view-btn" data-view="day">Day</button>
            <button class="view-btn" data-view="week">Week</button>
            <button class="view-btn" data-view="month">Month</button>
            <button class="view-btn" data-view="tasks">Tasks</button>
            <button class="view-btn" data-view="analytics">Analytics</button>
          </div>
        </div>
      </header>
      <div id="cal-body"></div>
    </div>
  </div>

  <!-- ===== EVENT MODAL ===== -->
  <div id="event-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">New Event</h3>
        <button class="modal-close-btn">&#10005;</button>
      </div>
      <form id="event-form">
        <div class="form-group">
          <input type="text" id="event-title" placeholder="Add title" autocomplete="off" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="event-date" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start time</label>
            <input type="time" id="event-start" required>
          </div>
          <div class="form-group">
            <label>End time</label>
            <input type="time" id="event-end" required>
          </div>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="event-category"></select>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="event-desc" rows="3" placeholder="Add description..."></textarea>
        </div>
        <div class="form-group">
          <label>Repeat</label>
          <select id="event-recurrence-type">
            <option value="none">Does not repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
        <div id="recurrence-options" class="recurrence-options hidden">
          <div class="recurrence-interval-row">
            <span class="recurrence-label">Every</span>
            <input type="number" id="event-recurrence-interval" min="1" max="99" value="1" class="recurrence-interval-input">
            <span id="recurrence-unit-label" class="recurrence-label">days</span>
          </div>
          <div id="recurrence-days-row" class="recurrence-days-row hidden">
            <span class="recurrence-label">On</span>
            <div class="recurrence-days">
              <button type="button" class="rec-day-btn" data-day="0">Su</button>
              <button type="button" class="rec-day-btn" data-day="1">Mo</button>
              <button type="button" class="rec-day-btn" data-day="2">Tu</button>
              <button type="button" class="rec-day-btn" data-day="3">We</button>
              <button type="button" class="rec-day-btn" data-day="4">Th</button>
              <button type="button" class="rec-day-btn" data-day="5">Fr</button>
              <button type="button" class="rec-day-btn" data-day="6">Sa</button>
            </div>
          </div>
          <div class="form-group">
            <label>End date (optional)</label>
            <input type="date" id="event-recurrence-end">
          </div>
        </div>
        <div id="edit-scope-row" class="form-group hidden">
          <label>Apply changes to</label>
          <div class="edit-scope-options">
            <label class="edit-scope-label"><input type="radio" name="edit-scope" value="one" checked> This event only</label>
            <label class="edit-scope-label"><input type="radio" name="edit-scope" value="future"> This and following events</label>
            <label class="edit-scope-label"><input type="radio" name="edit-scope" value="all"> All events</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="delete-event-btn" class="btn-danger hidden">Delete</button>
          <div class="modal-footer-right">
            <button type="button" class="btn-cancel modal-close-btn">Cancel</button>
            <button type="submit" class="btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== CATEGORY MODAL ===== -->
  <div id="category-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Manage Categories</h3>
        <button class="modal-close-btn">&#10005;</button>
      </div>
      <div id="cat-modal-list"></div>
      <form id="add-cat-form">
        <div class="add-cat-row">
          <input type="text" id="new-cat-name" placeholder="New category name" required autocomplete="off">
          <input type="color" id="new-cat-color" value="#4285f4" title="Pick color">
          <button type="submit" class="btn-primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== PROFILE MODAL ===== -->
  <div id="profile-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content profile-modal-content">
      <div class="modal-header">
        <h3>Profiles</h3>
        <button class="modal-close-btn">&#10005;</button>
      </div>
      <div id="profile-modal-body"></div>
    </div>
  </div>

  <!-- ===== IMPORT REVIEW MODAL ===== -->
  <div id="import-review-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content import-review-content">
      <div class="modal-header">
        <h3>Review Import</h3>
        <button class="modal-close-btn">&#10005;</button>
      </div>
      <div id="import-review-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
